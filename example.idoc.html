<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>iDoc Interactive Demo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap');
    @import url('https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css');

    :root {
      color-scheme: light;
      --font-sans: "Manrope", "Segoe UI", sans-serif;
      --font-mono: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace;
      --bg: #f3efe7;
      --bg-accent: radial-gradient(circle at top left, rgba(15, 118, 110, 0.16), transparent 34%), radial-gradient(circle at bottom right, rgba(217, 119, 6, 0.14), transparent 28%), linear-gradient(180deg, #fbf8f2 0%, #efe8db 100%);
      --surface: rgba(255, 252, 247, 0.82);
      --surface-strong: #fffdf8;
      --surface-soft: #f6f0e4;
      --page: #fffdf8;
      --page-border: rgba(120, 102, 75, 0.2);
      --text: #1c2526;
      --muted: #5d6668;
      --accent: #0f766e;
      --accent-strong: #115e59;
      --accent-soft: rgba(15, 118, 110, 0.12);
      --warning: #b45309;
      --warning-soft: rgba(245, 158, 11, 0.16);
      --danger: #b42318;
      --danger-soft: rgba(217, 45, 32, 0.12);
      --success: #16794d;
      --success-soft: rgba(22, 121, 77, 0.12);
      --shadow-lg: 0 24px 60px rgba(42, 38, 30, 0.14);
      --shadow-md: 0 14px 32px rgba(42, 38, 30, 0.11);
      --shadow-sm: 0 8px 18px rgba(42, 38, 30, 0.08);
      --radius-xl: 26px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --radius-sm: 10px;
    }

    html[data-theme="dark"] {
      color-scheme: dark;
      --bg: #101718;
      --bg-accent: radial-gradient(circle at top left, rgba(94, 234, 212, 0.1), transparent 32%), radial-gradient(circle at bottom right, rgba(251, 191, 36, 0.09), transparent 26%), linear-gradient(180deg, #0f1718 0%, #131d1f 100%);
      --surface: rgba(18, 28, 30, 0.86);
      --surface-strong: #172124;
      --surface-soft: #1b282b;
      --page: #1a2426;
      --page-border: rgba(174, 203, 198, 0.12);
      --text: #eff7f5;
      --muted: #a7bab6;
      --accent: #5eead4;
      --accent-strong: #99f6e4;
      --accent-soft: rgba(94, 234, 212, 0.16);
      --warning: #fbbf24;
      --warning-soft: rgba(251, 191, 36, 0.12);
      --danger: #f97066;
      --danger-soft: rgba(249, 112, 102, 0.16);
      --success: #6ce9a6;
      --success-soft: rgba(108, 233, 166, 0.14);
      --shadow-lg: 0 24px 60px rgba(0, 0, 0, 0.34);
      --shadow-md: 0 14px 32px rgba(0, 0, 0, 0.28);
      --shadow-sm: 0 8px 18px rgba(0, 0, 0, 0.2);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      font-family: var(--font-sans);
      color: var(--text);
      background: var(--bg-accent), var(--bg);
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    a {
      color: inherit;
    }

    :focus-visible {
      outline: 3px solid color-mix(in srgb, var(--accent) 78%, white 22%);
      outline-offset: 3px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .app-shell {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 40;
      padding: 18px 22px 14px;
      backdrop-filter: blur(18px);
      background: color-mix(in srgb, var(--surface) 86%, transparent 14%);
      border-bottom: 1px solid color-mix(in srgb, var(--page-border) 70%, transparent 30%);
      box-shadow: var(--shadow-sm);
    }

    .toolbar-main {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(320px, 1fr);
      gap: 18px;
      align-items: start;
    }

    .brand {
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .brand-badge {
      width: 54px;
      height: 54px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border-radius: 16px;
      background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 84%, white 16%), color-mix(in srgb, var(--warning) 78%, white 22%));
      color: #fefefe;
      font-weight: 800;
      letter-spacing: 0.08em;
      box-shadow: var(--shadow-md);
    }

    .brand-copy {
      min-width: 0;
    }

    .brand-title {
      margin: 0;
      font-size: clamp(1.15rem, 2vw, 1.45rem);
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .brand-meta {
      margin-top: 6px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 0.93rem;
    }

    .meta-pill,
    .page-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 11px;
      border-radius: 999px;
      background: var(--surface-soft);
      border: 1px solid color-mix(in srgb, var(--page-border) 75%, transparent 25%);
    }

    .toolbar-controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-width: 0;
    }

    .control-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: flex-end;
    }

    .search-wrap {
      min-width: min(100%, 340px);
      max-width: 420px;
      flex: 1 1 280px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: var(--surface-soft);
      border-radius: 16px;
      border: 1px solid color-mix(in srgb, var(--page-border) 75%, transparent 25%);
    }

    .search-wrap input {
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--text);
      min-width: 0;
    }

    .search-wrap input::placeholder {
      color: color-mix(in srgb, var(--muted) 72%, transparent 28%);
    }

    .button {
      appearance: none;
      border: 1px solid color-mix(in srgb, var(--page-border) 70%, transparent 30%);
      background: var(--surface-strong);
      color: var(--text);
      border-radius: 14px;
      padding: 10px 14px;
      line-height: 1;
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: transform 140ms ease, background-color 140ms ease, border-color 140ms ease, box-shadow 140ms ease;
      box-shadow: var(--shadow-sm);
      font-weight: 600;
    }

    .button:hover:not(:disabled) {
      transform: translateY(-1px);
      border-color: color-mix(in srgb, var(--accent) 38%, var(--page-border) 62%);
    }

    .button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      box-shadow: none;
    }

    .button.primary {
      background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 82%, white 18%), color-mix(in srgb, var(--accent-strong) 92%, black 8%));
      color: #f8fdfc;
      border-color: transparent;
    }

    .button.ghost {
      background: transparent;
      box-shadow: none;
    }

    .button.warn {
      background: color-mix(in srgb, var(--warning-soft) 86%, var(--surface-strong) 14%);
    }

    .button.small {
      min-height: 36px;
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 0.92rem;
      box-shadow: none;
    }

    .page-indicator {
      min-width: 112px;
      justify-content: center;
      font-weight: 700;
      letter-spacing: 0.02em;
      background: var(--surface-soft);
      border-radius: 14px;
      padding: 10px 12px;
      border: 1px solid color-mix(in srgb, var(--page-border) 75%, transparent 25%);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    .toolbar-subrow {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .workspace {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: 1fr;
      gap: 0;
    }

    .workspace.is-editor {
      grid-template-columns: minmax(320px, 420px) 1fr;
    }

    .editor-panel {
      border-right: 1px solid color-mix(in srgb, var(--page-border) 75%, transparent 25%);
      background: color-mix(in srgb, var(--surface) 90%, transparent 10%);
      backdrop-filter: blur(14px);
      padding: 20px;
      overflow: auto;
      display: none;
      box-shadow: inset -1px 0 0 rgba(255, 255, 255, 0.05);
    }

    .workspace.is-editor .editor-panel {
      display: block;
    }

    .editor-stack {
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 100%;
    }

    .editor-card,
    .notice-banner {
      background: color-mix(in srgb, var(--surface-strong) 88%, transparent 12%);
      border: 1px solid color-mix(in srgb, var(--page-border) 75%, transparent 25%);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
    }

    .editor-card {
      padding: 16px;
    }

    .editor-card h2,
    .editor-card h3 {
      margin: 0 0 10px;
      font-size: 1rem;
      letter-spacing: -0.02em;
    }

    .editor-copy {
      margin: 0;
      color: var(--muted);
      font-size: 0.94rem;
      line-height: 1.5;
    }

    .editor-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .editor-textarea {
      width: 100%;
      min-height: 420px;
      resize: vertical;
      border: 1px solid color-mix(in srgb, var(--page-border) 70%, transparent 30%);
      border-radius: 18px;
      background: color-mix(in srgb, var(--surface-soft) 82%, transparent 18%);
      color: var(--text);
      padding: 16px;
      box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.04);
      font-family: var(--font-mono);
      font-size: 0.89rem;
      line-height: 1.55;
      tab-size: 2;
    }

    .field-stack {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .field-stack label {
      font-size: 0.92rem;
      font-weight: 700;
    }

    .inline-file {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .inline-file input[type="file"] {
      max-width: 100%;
    }

    .viewer-pane {
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .notice-area {
      padding: 18px 22px 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .notice-banner {
      padding: 13px 15px;
      color: var(--text);
      line-height: 1.45;
    }

    .notice-banner.info {
      background: color-mix(in srgb, var(--accent-soft) 78%, var(--surface-strong) 22%);
    }

    .notice-banner.warning {
      background: color-mix(in srgb, var(--warning-soft) 82%, var(--surface-strong) 18%);
    }

    .notice-banner.error {
      background: color-mix(in srgb, var(--danger-soft) 82%, var(--surface-strong) 18%);
    }

    .notice-banner.success {
      background: color-mix(in srgb, var(--success-soft) 82%, var(--surface-strong) 18%);
    }

    .document-scroll {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 18px 22px 34px;
      scroll-behavior: smooth;
    }

    .page-stack {
      width: min(100%, 930px);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .page-card {
      background: linear-gradient(180deg, color-mix(in srgb, var(--page) 96%, white 4%) 0%, var(--page) 100%);
      border-radius: var(--radius-xl);
      border: 1px solid var(--page-border);
      box-shadow: var(--shadow-lg);
      padding: clamp(22px, 3vw, 34px);
      position: relative;
      overflow: hidden;
      min-height: 420px;
    }

    .page-card::before {
      content: "";
      position: absolute;
      inset: 0 auto auto 0;
      width: 100%;
      height: 8px;
      background: linear-gradient(90deg, color-mix(in srgb, var(--accent) 85%, white 15%), color-mix(in srgb, var(--warning) 82%, white 18%));
      opacity: 0.95;
    }

    .page-header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 10px;
      align-items: baseline;
      padding-top: 8px;
      margin-bottom: 20px;
    }

    .page-title {
      margin: 0;
      font-size: clamp(1.1rem, 2vw, 1.4rem);
      letter-spacing: -0.03em;
    }

    .page-label {
      font-size: 0.88rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
    }

    .page-body {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .doc-heading {
      margin: 0;
      line-height: 1.08;
      letter-spacing: -0.04em;
    }

    .doc-heading.level-1 {
      font-size: clamp(1.8rem, 4vw, 2.7rem);
    }

    .doc-heading.level-2 {
      font-size: clamp(1.4rem, 3vw, 2rem);
    }

    .doc-heading.level-3,
    .doc-heading.level-4,
    .doc-heading.level-5,
    .doc-heading.level-6 {
      font-size: 1.15rem;
    }

    .doc-paragraph,
    .doc-text,
    .doc-quote-content,
    .doc-callout-copy {
      margin: 0;
      color: color-mix(in srgb, var(--text) 94%, var(--muted) 6%);
      line-height: 1.72;
      white-space: pre-line;
    }

    .doc-text {
      font-size: 0.97rem;
      color: var(--muted);
    }

    .doc-separator {
      border: 0;
      border-top: 1px solid color-mix(in srgb, var(--page-border) 75%, transparent 25%);
      margin: 10px 0 2px;
    }

    .doc-callout,
    .doc-warning,
    .question-card,
    .doc-input-card,
    .doc-math {
      border-radius: var(--radius-lg);
      border: 1px solid color-mix(in srgb, var(--page-border) 75%, transparent 25%);
      padding: 16px 18px;
      background: color-mix(in srgb, var(--surface-soft) 84%, transparent 16%);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .doc-callout.info {
      background: color-mix(in srgb, var(--accent-soft) 70%, var(--surface-strong) 30%);
    }

    .doc-callout.warn {
      background: color-mix(in srgb, var(--warning-soft) 74%, var(--surface-strong) 26%);
    }

    .doc-callout.success {
      background: color-mix(in srgb, var(--success-soft) 70%, var(--surface-strong) 30%);
    }

    .doc-callout-title,
    .doc-warning-title {
      margin: 0 0 8px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .doc-warning {
      background: color-mix(in srgb, var(--danger-soft) 68%, var(--surface-strong) 32%);
    }

    .doc-warning-copy {
      margin: 0;
      line-height: 1.6;
      color: color-mix(in srgb, var(--text) 92%, var(--muted) 8%);
    }

    .doc-math {
      overflow-x: auto;
      font-size: 1.02rem;
    }

    .doc-code {
      margin: 0;
      padding: 16px;
      border-radius: var(--radius-lg);
      background: color-mix(in srgb, var(--surface-soft) 66%, black 4%);
      border: 1px solid color-mix(in srgb, var(--page-border) 75%, transparent 25%);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
      font-family: var(--font-mono);
      font-size: 0.88rem;
      line-height: 1.68;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-x: auto;
    }

    .doc-code-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 0.78rem;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--surface-soft);
      border: 1px solid color-mix(in srgb, var(--page-border) 75%, transparent 25%);
    }

    .doc-quote {
      margin: 0;
      padding: 4px 0 4px 18px;
      border-left: 4px solid color-mix(in srgb, var(--accent) 65%, transparent 35%);
    }

    .doc-quote cite {
      display: block;
      margin-top: 8px;
      font-size: 0.9rem;
      color: var(--muted);
      font-style: normal;
    }

    .doc-list {
      margin: 0;
      padding-left: 22px;
      line-height: 1.7;
    }

    .doc-list li + li {
      margin-top: 6px;
    }

    .doc-image {
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .doc-image img {
      width: 100%;
      max-height: 320px;
      object-fit: cover;
      border-radius: var(--radius-lg);
      border: 1px solid color-mix(in srgb, var(--page-border) 75%, transparent 25%);
      box-shadow: var(--shadow-md);
      background: color-mix(in srgb, var(--surface-soft) 85%, transparent 15%);
    }

    .doc-image figcaption {
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.6;
    }

    .doc-button-row,
    .question-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .doc-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      color: color-mix(in srgb, var(--accent) 88%, var(--text) 12%);
      text-decoration: none;
      text-underline-offset: 4px;
    }

    .doc-link:hover,
    .doc-link:focus-visible {
      text-decoration: underline;
    }

    .doc-spacer {
      width: 100%;
    }

    .doc-input-card input,
    .doc-input-card textarea {
      width: 100%;
      margin-top: 10px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid color-mix(in srgb, var(--page-border) 75%, transparent 25%);
      background: var(--surface-strong);
      color: var(--text);
    }

    .doc-input-help {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .question-card {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .question-prompt {
      margin: 0;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .question-options {
      display: grid;
      gap: 10px;
    }

    .question-option {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid color-mix(in srgb, var(--page-border) 75%, transparent 25%);
      background: color-mix(in srgb, var(--surface-strong) 92%, transparent 8%);
      cursor: pointer;
    }

    .question-option input {
      margin-top: 4px;
    }

    .question-feedback {
      padding: 13px 14px;
      border-radius: 14px;
      line-height: 1.6;
      font-size: 0.95rem;
    }

    .question-feedback.correct {
      background: color-mix(in srgb, var(--success-soft) 82%, var(--surface-strong) 18%);
    }

    .question-feedback.incorrect {
      background: color-mix(in srgb, var(--danger-soft) 82%, var(--surface-strong) 18%);
    }

    .question-feedback.reveal {
      background: color-mix(in srgb, var(--accent-soft) 82%, var(--surface-strong) 18%);
    }

    .editable-text {
      position: relative;
      cursor: text;
      border-radius: 12px;
      transition: background-color 140ms ease, box-shadow 140ms ease, outline-color 140ms ease;
    }

    .editable-text:hover,
    .editable-text:focus-visible {
      background: color-mix(in srgb, var(--accent-soft) 60%, transparent 40%);
      box-shadow: 0 0 0 1px color-mix(in srgb, var(--accent) 28%, transparent 72%);
    }

    .editable-text::after {
      content: "Edit";
      position: absolute;
      top: -10px;
      right: 10px;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: color-mix(in srgb, var(--surface-strong) 94%, transparent 6%);
      border: 1px solid color-mix(in srgb, var(--page-border) 75%, transparent 25%);
      color: var(--muted);
      opacity: 0;
      transform: translateY(2px);
      transition: opacity 140ms ease, transform 140ms ease;
      pointer-events: none;
    }

    .editable-text:hover::after,
    .editable-text:focus-visible::after {
      opacity: 1;
      transform: translateY(0);
    }

    .editable-control {
      cursor: pointer;
    }

    .editable-control::after {
      right: 8px;
      top: -8px;
    }

    .inline-editor {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 12px;
      border-radius: 18px;
      border: 1px solid color-mix(in srgb, var(--accent) 38%, var(--page-border) 62%);
      background: color-mix(in srgb, var(--accent-soft) 60%, var(--surface-strong) 40%);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .inline-editor.compact {
      padding: 10px;
      gap: 8px;
    }

    .inline-editor-label {
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .inline-editor-input {
      width: 100%;
      min-height: 44px;
      padding: 11px 12px;
      border-radius: 14px;
      border: 1px solid color-mix(in srgb, var(--page-border) 75%, transparent 25%);
      background: var(--surface-strong);
      color: var(--text);

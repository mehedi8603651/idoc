    /* END_KATEX_CSS */
    :root {
      color-scheme: light;
      --bg: #f3efe7;
      --bg-accent: radial-gradient(circle at top left, rgba(15, 118, 110, .18), transparent 34%), radial-gradient(circle at bottom right, rgba(217, 119, 6, .16), transparent 28%), linear-gradient(180deg, #fbf8f2 0%, #efe8db 100%);
      --surface: rgba(255, 252, 247, .86);
      --surface-soft: #f6f0e4;
      --page: #fffdf8;
      --page-border: rgba(120, 102, 75, .2);
      --text: #1c2526;
      --muted: #5d6668;
      --accent: #0f766e;
      --accent-soft: rgba(15, 118, 110, .12);
      --success-soft: rgba(22, 121, 77, .12);
      --warning-soft: rgba(217, 119, 6, .12);
      --shadow: 0 18px 40px rgba(42, 38, 30, .12);
      font-family: "Segoe UI", system-ui, sans-serif;
    }
    html[data-theme="dark"] {
      color-scheme: dark;
      --bg: #101718;
      --bg-accent: radial-gradient(circle at top left, rgba(94, 234, 212, .11), transparent 32%), radial-gradient(circle at bottom right, rgba(251, 191, 36, .09), transparent 26%), linear-gradient(180deg, #0f1718 0%, #131d1f 100%);
      --surface: rgba(18, 28, 30, .88);
      --surface-soft: #1b282b;
      --page: #1a2426;
      --page-border: rgba(174, 203, 198, .12);
      --text: #eff7f5;
      --muted: #a7bab6;
      --accent: #5eead4;
      --accent-soft: rgba(94, 234, 212, .16);
      --success-soft: rgba(108, 233, 166, .14);
      --warning-soft: rgba(251, 191, 36, .12);
      --shadow: 0 18px 40px rgba(0, 0, 0, .3);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body { background: var(--bg-accent), var(--bg); color: var(--text); }
    button, input { font: inherit; }
    :focus-visible { outline: 3px solid color-mix(in srgb, var(--accent) 72%, white 28%); outline-offset: 3px; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0; }
    .shell { min-height: 100vh; display: flex; flex-direction: column; }
    .topbar { position: sticky; top: 0; z-index: 20; display: flex; justify-content: space-between; gap: 18px; align-items: center; padding: 16px 20px; background: color-mix(in srgb, var(--surface) 88%, transparent 12%); backdrop-filter: blur(16px); border-bottom: 1px solid color-mix(in srgb, var(--page-border) 70%, transparent 30%); box-shadow: 0 8px 24px rgba(0, 0, 0, .06); }
    .brand { display: flex; gap: 14px; align-items: center; min-width: 0; }
    .badge { width: 48px; height: 48px; display: grid; place-items: center; border-radius: 16px; background: linear-gradient(135deg, var(--accent), #d97706); color: #fff; font-weight: 800; letter-spacing: .08em; }
    .pill { display: inline-flex; align-items: center; gap: 6px; padding: 6px 10px; border-radius: 999px; background: var(--surface-soft); border: 1px solid color-mix(in srgb, var(--page-border) 76%, transparent 24%); }
    .tools { display: flex; flex-wrap: wrap; gap: 10px; justify-content: flex-end; }
    .btn, .search { min-height: 44px; border-radius: 14px; border: 1px solid color-mix(in srgb, var(--page-border) 74%, transparent 26%); background: var(--page); color: var(--text); padding: 0 14px; }
    .btn { cursor: pointer; }
    .btn:disabled { opacity: .42; cursor: default; }
    .icon-btn { width: 44px; padding: 0; display: inline-flex; align-items: center; justify-content: center; }
    .icon-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.9; stroke-linecap: round; stroke-linejoin: round; }
    .search-wrap { display: flex; align-items: center; gap: 8px; }
    .search { width: 0; opacity: 0; padding: 0; border-width: 0; pointer-events: none; transition: width 180ms ease, opacity 160ms ease, padding 180ms ease, border-width 180ms ease; }
    .search-wrap.open .search { width: min(220px, 42vw); opacity: 1; padding: 0 14px; border-width: 1px; pointer-events: auto; }
    .theme-light-icon { display: none; }
    html[data-theme="dark"] .theme-dark-icon { display: none; }
    html[data-theme="dark"] .theme-light-icon { display: block; }
    .workspace { flex: 1; display: flex; min-height: 0; }
    .sidebar { width: 270px; flex: 0 0 270px; overflow: auto; padding: 18px; border-right: 1px solid color-mix(in srgb, var(--page-border) 70%, transparent 30%); background: color-mix(in srgb, var(--surface) 82%, transparent 18%); }
    .sidebar.hidden { display: none; }
    .sidebar h2 { margin: 0 0 8px; font-size: 1rem; }
    .sidebar p { margin: 0 0 16px; color: var(--muted); font-size: .92rem; line-height: 1.5; }
    .page-link { width: 100%; margin-bottom: 10px; text-align: left; padding: 14px; border-radius: 18px; border: 1px solid color-mix(in srgb, var(--page-border) 72%, transparent 28%); background: var(--page); color: var(--text); cursor: pointer; }
    .page-link.active { border-color: var(--accent); background: color-mix(in srgb, var(--accent-soft) 74%, var(--page) 26%); }
    .reader { flex: 1; overflow: auto; padding: 24px; }
    .reader-inner { width: min(920px, 100%); margin: 0 auto; display: flex; flex-direction: column; gap: 26px; }
    .page-shell { padding: 18px; border-radius: 26px; background: color-mix(in srgb, var(--surface) 88%, transparent 12%); box-shadow: var(--shadow); }
    .page { background: var(--page); border-radius: 22px; border: 1px solid color-mix(in srgb, var(--page-border) 78%, transparent 22%); padding: 32px; }
    .eyebrow { display: flex; justify-content: space-between; gap: 16px; align-items: center; color: var(--muted); font-size: .92rem; margin-bottom: 12px; }
    .page h2 { margin: 0 0 24px; font-size: clamp(1.8rem, 3vw, 2.4rem); letter-spacing: -.04em; }
    .content { display: flex; flex-wrap: wrap; gap: 18px; align-items: flex-start; }
    .content > * { flex: 1 1 100%; min-width: 0; max-width: 100%; }
    .display-math { display: block; margin: .5em 0; overflow-x: auto; }
    .inline-math { display: inline-block; max-width: 100%; vertical-align: middle; }
    .content p, .content li { line-height: 1.75; }
    .rich-text { white-space: pre-wrap; tab-size: 4; }
    .rich-text .display-math, .rich-text .inline-math { white-space: normal; }
    .callout { border-radius: 20px; padding: 18px; background: var(--surface-soft); border: 1px solid color-mix(in srgb, var(--page-border) 76%, transparent 24%); }
    .callout.info { background: color-mix(in srgb, var(--accent-soft) 72%, var(--surface-soft) 28%); }
    .callout.success { background: color-mix(in srgb, var(--success-soft) 72%, var(--surface-soft) 28%); }
    .callout.warning { background: color-mix(in srgb, var(--warning-soft) 72%, var(--surface-soft) 28%); }
    .callout h3 { margin: 0 0 8px; }
    .code { margin: 0; padding: 16px 18px; border-radius: 18px; background: #101718; color: #eff7f5; overflow: auto; font-family: Consolas, monospace; font-size: .92rem; line-height: 1.6; }
    .quote { margin: 0; padding-left: 18px; border-left: 3px solid var(--accent); }
    .figure img { width: 100%; border-radius: 18px; border: 1px solid color-mix(in srgb, var(--page-border) 74%, transparent 26%); }
    .caption, .help, .cite { color: var(--muted); font-size: .92rem; }
    .link, .action { display: inline-flex; align-items: center; gap: 8px; width: fit-content; min-height: 44px; padding: 10px 16px; border-radius: 14px; border: 1px solid color-mix(in srgb, var(--page-border) 72%, transparent 28%); background: var(--surface-soft); color: var(--text); cursor: pointer; text-decoration: none; }
    .action.primary { background: var(--accent); color: #fff; border-color: transparent; }
    .field { display: flex; flex-direction: column; gap: 10px; }
    .field label { font-weight: 700; }
    .field input { min-height: 44px; padding: 0 14px; border-radius: 14px; border: 1px solid color-mix(in srgb, var(--page-border) 74%, transparent 26%); background: var(--page); color: var(--text); }
    .math { margin: 0; padding: 14px 16px; border-radius: 16px; background: var(--surface-soft); overflow: auto; font-family: Consolas, monospace; }
    .math .katex-display { margin: 0; overflow-x: auto; overflow-y: hidden; }
    .question { padding: 18px; border-radius: 20px; background: var(--surface-soft); border: 1px solid color-mix(in srgb, var(--page-border) 72%, transparent 28%); }
    .question h3 { margin: 0 0 12px; }

      const KATEX_URL = 'https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js';

      const state = { currentPage: 0, theme: 'light', sidebarOpen: true, search: '', searchOpen: false, answers: {}, reveals: {}, inputs: {}, runtime: {} };
      const refs = {
        pageIndicator: document.getElementById('page-indicator'),
        prev: document.getElementById('prev-page'),
        next: document.getElementById('next-page'),
        theme: document.getElementById('toggle-theme'),
        pages: document.getElementById('toggle-pages'),
        searchToggle: document.getElementById('toggle-search'),
        searchWrap: document.getElementById('search-wrap'),
        sidebar: document.getElementById('sidebar'),
        pageList: document.getElementById('page-list'),
        search: document.getElementById('search-input'),
        reader: document.getElementById('reader'),
        readerInner: document.getElementById('reader-inner'),

      let doc;
      let observer;

      init();

      function init() {

        bind();

      function normalize(raw) {
        if (!raw || typeof raw !== 'object') throw new Error('Invalid iDoc payload.');

          meta: {
            title: text(meta.title, 'Untitled iDoc'),
            author: text(meta.author, 'Unknown'),
            version: text(meta.version, '1.0'),
            theme: meta.theme === 'dark' ? 'dark' : 'light',
            recommendedFilename: text(meta.recommendedFilename, 'document.idoc.html')

          state: { currentPage: int(raw.state && raw.state.currentPage, 0) },
          pages,
          actions: map(raw.actions)

      }

      function bind() {
        state.currentPage = clamp(doc.state.currentPage);
        state.theme = doc.meta.theme;
        refs.prev.addEventListener('click', () => goToPage(state.currentPage - 1));
        refs.next.addEventListener('click', () => goToPage(state.currentPage + 1));
        refs.theme.addEventListener('click', toggleTheme);
        refs.pages.addEventListener('click', () => {

          refs.sidebar.classList.toggle('hidden', !state.sidebarOpen);
          saveViewerState();
        });
        refs.searchToggle.addEventListener('click', () => {
          if (!state.searchOpen) {
            state.searchOpen = true;
            syncToolbarState();
            refs.search.focus();
            refs.search.select();
            return;
          }
          refs.search.focus();
          if (!state.search.trim()) {
            state.searchOpen = false;
            syncToolbarState();
          } else {
            refs.search.select();
          }
        });
        refs.search.addEventListener('input', (event) => {
          state.search = event.target.value || '';
          render();
        });
        refs.search.addEventListener('focus', () => {
          state.searchOpen = true;
          syncToolbarState();
        });
        refs.search.addEventListener('blur', () => {
          if (!state.search.trim()) {
            state.searchOpen = false;
            syncToolbarState();
          }
        });

            refs.search.select();

      function render() {
        document.documentElement.setAttribute('data-theme', state.theme);
        document.title = doc.meta.title;
        syncToolbarState();
        renderSidebar();
        renderPages();
      }

      function syncToolbarState() {
        refs.pageIndicator.textContent = `Page ${state.currentPage + 1} / ${doc.pages.length}`;
        refs.prev.disabled = state.currentPage <= 0;
        refs.next.disabled = state.currentPage >= doc.pages.length - 1;
        refs.theme.setAttribute('aria-label', state.theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
        refs.theme.setAttribute('title', state.theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');

      }

      function renderSidebar() {
        refs.pageList.innerHTML = '';
        const hits = searchPages();
        doc.pages.forEach((page, index) => {
          const button = el('button', { className: `page-link${index === state.currentPage ? ' active' : ''}`, type: 'button' });
          button.appendChild(el('div', { textContent: page.title }));
          button.appendChild(el('div', { className: 'caption', textContent: `${page.elements.length} blocks${hits.includes(index) ? ' â€¢ search hit' : ''}` }));
          button.addEventListener('click', () => goToPage(index));
          refs.pageList.appendChild(button);
        });
      }

      function renderPages() {
        refs.readerInner.innerHTML = '';
        doc.pages.forEach((page, index) => {
          const shell = el('section', { className: 'page-shell' });
          shell.dataset.pageIndex = String(index);
          const card = el('article', { className: 'page' });
          const eyebrow = el('div', { className: 'eyebrow' });
          eyebrow.appendChild(el('span', { className: 'pill', textContent: `Page ${index + 1}` }));
          eyebrow.appendChild(el('span', { className: 'pill', textContent: page.id }));
          card.appendChild(eyebrow);
          card.appendChild(el('h2', { textContent: page.title }));
          const content = el('div', { className: 'content' });
          page.elements.forEach((element) => content.appendChild(renderElement(element)));
          card.appendChild(content);
          shell.appendChild(card);
          refs.readerInner.appendChild(shell);
        });

      function renderElement(element) {
        const type = text(element.type, 'unknown');
        if (type === 'heading') {
          const level = Math.min(6, Math.max(1, int(element.level, 1)));
          const node = el(`h${level}`);
          setRichText(node, text(element.text, ''), true);
          applyFontSize(node, element);
          applyBlockWidth(node, element);
          return node;
        }
        if (type === 'paragraph' || type === 'text') {
          const node = el('p');
          setRichText(node, text(element.text, ''), true);
          applyFontSize(node, element);
          applyBlockWidth(node, element);
          return node;
        }
        if (type === 'math') {
          const node = el('div', { className: 'math', textContent: text(element.tex, '') });

          applyBlockWidth(node, element);
          return node;
        }
        if (type === 'image') {
          const wrap = el('figure', { className: 'figure' });
          wrap.appendChild(el('img', { src: text(element.src, ''), alt: text(element.alt, '') }));
          if (element.caption) {
            const caption = el('figcaption', { className: 'caption' });
            setRichText(caption, text(element.caption, ''), true);
            wrap.appendChild(caption);
          }
          applyBlockWidth(wrap, element);
          return wrap;
        }
        if (type === 'button' || type === 'link') {
          const node = el('button', { className: type === 'button' ? `action${element.variant === 'primary' ? ' primary' : ''}` : 'link', type: 'button' });
          setRichText(node, text(element.label, type === 'button' ? 'Run action' : 'Open link'), false);
          node.addEventListener('click', () => runAction(text(element.action, '')));
          applyFontSize(node, element);
          applyBlockWidth(node, element);
          return node;
        }
        if (type === 'separator') {
          const node = el('hr');
          applyBlockWidth(node, element);
          return node;
        }
        if (type === 'callout') {
          const node = el('section', { className: `callout ${text(element.tone, 'info')}` });

            const title = el('h3');
            setRichText(title, text(element.title, ''), true);
            node.appendChild(title);

          const body = el('p');
          setRichText(body, text(element.text, ''), true);
          node.appendChild(body);
          applyFontSize(node, element);
          applyBlockWidth(node, element);
          return node;

          applyBlockWidth(node, element);
          return node;

          setRichText(body, text(element.text, ''), true);

        return fallback;

      function renderQuestion(element) {
        const id = text(element.id, `question-${Math.random().toString(36).slice(2)}`);
        const node = el('section', { className: 'question' });
        applyFontSize(node, element);
        applyBlockWidth(node, element);

        setRichText(heading, text(element.prompt, 'Question'), true);

      }

      function renderInput(element) {
        const id = text(element.id, `input-${Math.random().toString(36).slice(2)}`);
        const node = el('div', { className: 'field' });
        applyFontSize(node, element);
        applyBlockWidth(node, element);
        const label = el('label');

      function runAction(actionId) {
        if (!actionId) return;
        const action = map(doc.actions[actionId]);

        modal.appendChild(close);
        refs.modal.appendChild(backdrop);
        refs.modal.appendChild(modal);
        close.focus();
      }

      function hideModal() {
        refs.modal.className = 'modal-root';
        refs.modal.innerHTML = '';
      }

      function toggleTheme() {
        state.theme = state.theme === 'dark' ? 'light' : 'dark';
        saveViewerState();
        render();
      }

      function goToPage(index) {
        state.currentPage = clamp(index);
        saveViewerState();
        renderSidebar();
        refs.pageIndicator.textContent = `Page ${state.currentPage + 1} / ${doc.pages.length}`;
        const target = refs.readerInner.querySelector(`[data-page-index="${state.currentPage}"]`);
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }

      function searchPages() {
        const query = state.search.trim().toLowerCase();
        if (!query) return [];
        return doc.pages.map((page, index) => {
          const hit = page.elements.some((element) => SEARCHABLE.has(text(element.type, '')) && searchText(element).toLowerCase().includes(query));
          return hit ? index : null;
        }).filter((value) => value !== null);
      }

      function searchText(element) {
        if (element.type === 'callout') return `${text(element.title, '')} ${text(element.text, '')}`;
        if (element.type === 'code') return text(element.code, '');
        return text(element.text, '');

      function setRichText(node, value, searchable) {
        node.innerHTML = '';

        parseRichText(value).forEach((segment) => {

            continue;

                buffer = '';
              }
              segments.push({ type: 'math', tex: input.slice(index + 2, close), display: true });
              index = close + 2;
              continue;
            }
          }
          if (input[index] === '$') {

            if (close !== -1) {
              if (buffer) {
                segments.push({ type: 'text', value: buffer });
                buffer = '';
              }
              segments.push({ type: 'math', tex: input.slice(index + 1, close), display: false });

        }

      function findMathClose(input, delimiter, start) {
        for (let index = start; index < input.length; index += 1) {

            continue;
          }
          if (delimiter === '$$' && input.startsWith('$$', index)) {
            return index;
          }
          if (delimiter === '$' && input[index] === '$') {
            return index;
          }
        }
        return -1;
      }

      function renderMathSegment(tex, displayMode) {
        const wrapper = el('span', { className: displayMode ? 'display-math' : 'inline-math' });
        const cleanTex = normalizeTex(String(tex || '').trim());
        if (!cleanTex) {
          return wrapper;
        }
        if (window.katex && typeof window.katex.renderToString === 'function') {
          try {
            wrapper.innerHTML = window.katex.renderToString(cleanTex, { throwOnError: false, displayMode });
            return wrapper;
          } catch (_) {}
        }
        wrapper.textContent = displayMode ? `$$${cleanTex}$$` : `$${cleanTex}$`;
        return wrapper;
      }

      function normalizeTex(value) {
        return String(value || '').replace(/\\\\(?=[A-Za-z,;!%])/g, '\\');
      }

      function observePages() {
        if (observer) observer.disconnect();
        observer = new IntersectionObserver((entries) => {
          const visible = entries.filter((entry) => entry.isIntersecting).sort((a, b) => b.intersectionRatio - a.intersectionRatio)[0];
          if (!visible) return;
          const index = int(visible.target.dataset.pageIndex, 0);
          if (index !== state.currentPage) {
            state.currentPage = index;
            refs.pageIndicator.textContent = `Page ${state.currentPage + 1} / ${doc.pages.length}`;
            renderSidebar();
          }
        }, { root: refs.reader, threshold: [.45, .62] });
        refs.readerInner.querySelectorAll('.page-shell').forEach((node) => observer.observe(node));
      }

      function loadViewerState() {
        try {
          const stored = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
          if (stored && typeof stored === 'object') {
            state.theme = stored.theme === 'dark' ? 'dark' : state.theme;
            state.sidebarOpen = stored.sidebarOpen !== false;
            state.answers = map(stored.answers);
            state.reveals = map(stored.reveals);
            state.inputs = map(stored.inputs);
            state.runtime = map(stored.runtime);
          }
        } catch (_) {}
        refs.sidebar.classList.toggle('hidden', !state.sidebarOpen);
      }

      function saveViewerState() {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify({
            theme: state.theme,
            sidebarOpen: state.sidebarOpen,
            answers: state.answers,
            reveals: state.reveals,
            inputs: state.inputs,
            runtime: state.runtime
          }));
        } catch (_) {}
      }

      function loadKatex() {
        loadScript(KATEX_URL).then(() => {
          renderPages();
          return loadScript(KATEX_AUTO_URL).catch(() => {});
        }).catch(() => {});
      }

      function loadScript(src) {
        return new Promise((resolve, reject) => {
          const script = document.createElement('script');
          script.src = src;
          script.async = true;
          script.onload = resolve;
          script.onerror = reject;
          document.head.appendChild(script);
        });
      }

      function renderFatal(error) {
        document.body.innerHTML = `<main style="min-height:100vh;display:grid;place-items:center;padding:24px;background:#f8f2e7;font-family:Segoe UI,sans-serif;"><div style="max-width:720px;background:white;border-radius:24px;padding:28px;border:1px solid #e7dccb;box-shadow:0 22px 44px rgba(0,0,0,.08);"><h1 style="margin-top:0;">This iDoc file could not be rendered.</h1><p style="line-height:1.7;color:#425054;">${escapeHtml(String(error && error.message ? error.message : error))}</p><p style="line-height:1.7;color:#425054;">Open the file again from iDoc Studio and export a fresh runtime copy.</p></div></main>`;
      }

      function clamp(index) { return Math.min(doc.pages.length - 1, Math.max(0, int(index, 0))); }
      function map(value) { return value && typeof value === 'object' && !Array.isArray(value) ? value : {}; }
      function text(value, fallback) { return typeof value === 'string' && value.trim().length ? value : fallback; }
      function applyFontSize(node, element) {
        const size = number(element && element.fontSize);
        if (!size) return;
        node.style.fontSize = `${Math.max(12, Math.min(42, size))}px`;
      }
      function applyBlockWidth(node, element) {
        const factor = normalizedWidth(number(element && element.width));
        if (!factor) return;
        const basis = blockBasis(factor);
        node.style.flex = `0 1 ${basis}`;
        node.style.maxWidth = basis;
      }
      function normalizedWidth(value) {
        if (!value) return 1;
        return Math.max(0.34, Math.min(1, value));
      }
      function blockBasis(factor) {
        if (factor >= 0.995) return '100%';
        const shrink = (1 - factor) * 18;
        return `calc(${(factor * 100).toFixed(2)}% - ${shrink.toFixed(2)}px)`;
      }
      function int(value, fallback) { const parsed = Number.parseInt(value, 10); return Number.isFinite(parsed) ? parsed : fallback; }
      function number(value) { const parsed = Number.parseFloat(value); return Number.isFinite(parsed) ? parsed : null; }
      function el(tag, props = {}) { const node = document.createElement(tag); Object.entries(props).forEach(([key, value]) => { if (value == null) return; if (key === 'className') node.className = value; else if (key === 'textContent') node.textContent = value; else if (key === 'style') node.setAttribute('style', value); else if (key === 'ariaLabel') node.setAttribute('aria-label', value); else node[key] = value; }); return node; }
      function escapeHtml(value) { return String(value).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
      function escapeRegex(value) { return String(value).replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
    })();
  </script>
</body>
</html>
